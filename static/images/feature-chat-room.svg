<svg width="640" height="480" viewBox="0 0 640 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="480" rx="32" fill="url(#chatBg)"/>

  <!-- phone frame -->
  <rect x="180" y="36" width="280" height="408" rx="36" fill="#2D2A4A"/>
  <rect x="194" y="60" width="252" height="360" rx="24" fill="#FEFCF9"/>

  <!-- status bar -->
  <rect x="210" y="72" width="60" height="8" rx="4" fill="#E0D5C8"/>
  <rect x="380" y="72" width="50" height="8" rx="4" fill="#E0D5C8"/>

  <!-- chat header -->
  <rect x="194" y="92" width="252" height="48" rx="0" fill="#7C3AED"/>
  <circle cx="224" cy="116" r="14" fill="#FFDDC1"/>
  <rect x="246" y="108" width="80" height="10" rx="5" fill="#E0D0FF"/>
  <rect x="246" y="122" width="50" height="6" rx="3" fill="#C4A8FF"/>

  <!-- chat bubbles -->
  <!-- received -->
  <rect x="214" y="156" width="160" height="44" rx="18" fill="#F3EDE6"/>
  <rect x="230" y="168" width="100" height="8" rx="4" fill="#8B7E70"/>
  <rect x="230" y="182" width="70" height="6" rx="3" fill="#A89B8D"/>

  <!-- sent -->
  <rect x="266" y="214" width="160" height="44" rx="18" fill="#7C3AED"/>
  <rect x="282" y="226" width="110" height="8" rx="4" fill="#E0D0FF"/>
  <rect x="282" y="240" width="80" height="6" rx="3" fill="#C4A8FF"/>

  <!-- received -->
  <rect x="214" y="272" width="140" height="44" rx="18" fill="#F3EDE6"/>
  <rect x="230" y="284" width="90" height="8" rx="4" fill="#8B7E70"/>
  <rect x="230" y="298" width="60" height="6" rx="3" fill="#A89B8D"/>

  <!-- sent -->
  <rect x="286" y="330" width="140" height="44" rx="18" fill="#FF7A5C"/>
  <rect x="302" y="342" width="96" height="8" rx="4" fill="#FFD4C8"/>
  <rect x="302" y="356" width="66" height="6" rx="3" fill="#FFBDAA"/>

  <!-- input bar -->
  <rect x="210" y="388" width="180" height="24" rx="12" fill="#F3EDE6"/>
  <rect x="400" y="386" width="32" height="28" rx="14" fill="#FFD166"/>

  <!-- decorative floating elements -->
  <!-- notification bell -->
  <circle cx="100" cy="120" r="28" fill="#FFD166"/>
  <rect x="92" y="108" width="16" height="18" rx="8" fill="#FFFFFF"/>
  <circle cx="100" cy="128" r="3" fill="#FFFFFF"/>
  <circle cx="112" cy="104" r="6" fill="#FF7A5C"/>

  <!-- checkmark badge -->
  <circle cx="540" cy="160" r="26" fill="#10B981"/>
  <path d="M528 160L536 168L554 150" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- emoji -->
  <circle cx="120" cy="340" r="24" fill="#FFD166"/>
  <circle cx="112" cy="336" r="4" fill="#2D2A4A"/>
  <circle cx="128" cy="336" r="4" fill="#2D2A4A"/>
  <path d="M110 348C116 356 124 356 130 348" stroke="#2D2A4A" stroke-width="3" stroke-linecap="round"/>

  <!-- star -->
  <path d="M540 320L546 336L564 336L550 346L554 362L540 352L526 362L530 346L516 336L534 336Z" fill="#FFD166" opacity="0.6"/>

  <!-- user avatars floating -->
  <circle cx="80" cy="220" r="20" fill="#6C63FF"/>
  <circle cx="80" cy="214" r="10" fill="#FFDDC1"/>
  
  <circle cx="560" cy="280" r="22" fill="#FF7A5C"/>
  <circle cx="560" cy="274" r="11" fill="#FFDDC1"/>

  <!-- small dots decoration -->
  <circle cx="140" cy="60" r="6" fill="#7C3AED" opacity="0.3"/>
  <circle cx="500" cy="80" r="8" fill="#FF7A5C" opacity="0.3"/>
  <circle cx="520" cy="400" r="6" fill="#6C63FF" opacity="0.3"/>
  <circle cx="100" cy="420" r="10" fill="#FFD166" opacity="0.3"/>

  <defs>
    <linearGradient id="chatBg" x1="0" y1="0" x2="640" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF5EE"/>
      <stop offset="0.5" stop-color="#F8F0FF"/>
      <stop offset="1" stop-color="#FFF0E8"/>
    </linearGradient>
  </defs>
</svg>
