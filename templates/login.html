{% extends "base.html" %}

{% block title %}로그인 - 스터디 메이트{% endblock %}

{% block content %}
<div class="center-layout">
    <section class="login-card">
        <a href="{{ url_for('home') }}" class="logo auth-logo">STUDY MATE</a>
        <h2 class="plain-title">로그인</h2>
        <p class="auth-copy">스터디 신청과 운영 관리는 로그인 후 이용할 수 있습니다.</p>

        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

            <div class="input-group">
                <label for="userid">아이디</label>
                <input id="userid" type="text" name="userid" placeholder="아이디를 입력하세요" required>
            </div>

            <div class="input-group">
                <label for="password">비밀번호</label>
                <div class="password-wrapper">
                    <input id="password" type="password" name="password" placeholder="비밀번호를 입력하세요" required>
                    <button type="button" id="toggle-password" class="icon-btn" aria-label="비밀번호 보기">보기</button>
                </div>
            </div>

            <button type="submit" class="primary-btn">로그인</button>
        </form>

        <p class="auth-footnote">
            계정이 없으신가요?
            <a href="{{ url_for('signup') }}" class="text-link-inline">회원가입</a>
        </p>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('toggle-password').addEventListener('click', function () {
        const input = document.getElementById('password');
        const nextType = input.type === 'password' ? 'text' : 'password';
        input.type = nextType;
        this.textContent = nextType === 'password' ? '보기' : '숨김';
    });
</script>
{% endblock %}
