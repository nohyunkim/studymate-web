{% extends "base.html" %}

{% block title %}스터디 모집하기 - 스터디 메이트{% endblock %}

{% block content %}
<section>
    <div class="section-heading">
        <h2>스터디 모집글 작성</h2>
    </div>

    <form action="{{ url_for('studywrite') }}" method="POST" class="editor-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

        <div class="input-group">
            <label for="title">스터디 제목</label>
            <input id="title" type="text" name="title" required maxlength="200" placeholder="무엇을 같이 할지 한 줄로 설명해주세요">
        </div>

        <div class="form-columns">
            <div class="input-group">
                <label for="category">카테고리</label>
                <select id="category" name="category" required>
                    <option value="">선택해주세요</option>
                    {% for group, options in study_categories %}
                        <optgroup label="{{ group }}">
                            {% for option in options %}
                                <option value="{{ option }}">{{ option }}</option>
                            {% endfor %}
                        </optgroup>
                    {% endfor %}
                </select>
            </div>

            <div class="input-group">
                <label for="member_count">모집 인원</label>
                <input id="member_count" type="number" name="member_count" min="1" required>
            </div>
        </div>

        <div class="input-group">
            <label for="chat_link">오픈채팅방 링크</label>
            <input id="chat_link" type="url" name="chat_link" placeholder="https://open.kakao.com/...">
            <p class="help-text">승인된 참여자에게만 상세 페이지에서 노출됩니다.</p>
        </div>

        <div class="input-group">
            <label for="content">상세 내용</label>
            <textarea id="content" name="content" required placeholder="스터디 목표, 진행 방식, 시간대, 필요한 준비물을 적어주세요"></textarea>
        </div>

        <button type="submit" class="primary-btn">작성 완료</button>
    </form>
</section>
{% endblock %}
